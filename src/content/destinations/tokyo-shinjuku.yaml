dagplanning:
  - titel: Aankomst & Shibuya
    subsections:
      - titel: Aankomst & Transfer
        beschrijving: Aankomst op Narita Airport na lange vlucht. Narita Express naar
          Shinjuku (~50 min) en lopen (~ 5 min) naar hotel. Inchecken hotel en
          even bijkomen van de lange vlucht.
      - titel: Avond — Shibuya Crossing & Shibuya Sky
        beschrijving: "De wijk Shibuya verkennen. Binnen een halfuur ben je met trein
          bij Shibuya Crossing — de beroemdste kruising ter wereld,
          indrukwekkend tijdens de avondspits. Daarna omhoog naar Shibuya Sky
          observatiedek voor panorama over de stad bij nacht. Kaartjes vooraf
          boeken. "
  - titel: Meiji Shrine & Harajuku
    content: >
      Begin vroeg bij Meiji Jingu, een serene shinto-schrijn in een bebost park.
      Loop daarna door Takeshita Street voor excentrieke mode en crepes, eindig
      op het chique Omotesando-boulevard.
  - titel: Dagtocht Mount Fuji
    content: >
      Fuji Excursion trein of Keio-bus vanuit Shinjuku naar Kawaguchiko (~2
      uur). Prachtige reflecties van de Fuji in het meer. Chureito
      Pagode-uitzichtpunt is onmisbaar. Ochtenduitzichten zijn het best — wolken
      trekken vaak op na de middag.
  - titel: Shinjuku Gyoen & Omoide Yokocho
    content: >
      Joaquin en Sacha arriveren rond 14:30 in Tokyo. Naar Shinjuku Gyoen voor
      herfstbladeren in de middag. 's Avonds Omoide Yokocho
      ("Herinneringssteeg") — smal steegje vol rokerige yakitori-stalletjes en
      de Golden Gai - smalle straat met leuke barretjes. 
