name: Tokyo (Shinjuku)
slug: tokyo-shinjuku
startDate: "2026-11-19"
endDate: "2026-11-23"
color: "#c8102e"

travel:
  from: Amsterdam (AMS)
  method: Vliegtuig
  details: |
    KLM KL861 | AMS 14:20 naar NRT 11:45+1 | 13u25 | Premium Comfort.
    Neem de Narita Express van het vliegveld naar Shinjuku Station (circa 80 minuten).
    Het hotel is op 5 minuten lopen van het station.

hotel:
  name: Hotel Sunroute Plaza Shinjuku
  address: Shinjuku, Tokyo
  notes: |
    Inchecken vanaf 15:00. Uitchecken voor 11:00. Ontbijt inbegrepen.
    Betaald 16 november: 235 euro.

restaurants:
  - name: Ichiran Ramen Shinjuku
    type: Ramen
    notes: Solo-eetcabines, intense tonkotsu bouillon. Open 24/7.
  - name: Omoide Yokocho
    type: Yakitori
    notes: Smal steegje vol rokerige yakitori-kraampjes. Ga na 19:00.
  - name: Tsunahachi Shinjuku
    type: Tempura
    notes: Klassieke tempura-eetzaak opgericht in 1923. Betaalbaar lunchmenu.
  - name: Niku no Mansei
    type: Sukiyaki / Shabu-shabu
    notes: Kwaliteitsvlees in een rustige omgeving vlak bij Shinjuku.

activities:
  brief:
    - Shibuya Crossing & Shibuya Sky
    - Meiji Shrine & Harajuku
    - Dagtocht naar Mount Fuji (Kawaguchiko)
    - Shinjuku Gyoen & Omoide Yokocho
  detailed:
    - name: Shibuya Crossing & Shibuya Sky
      when: Dag 1 — avond
      description: |
        Begin bij de beroemdste kruising ter wereld. Ga daarna omhoog naar het Shibuya Sky
        observatiedek (kaartjes vooraf online boeken) voor een 360 graden panorama over
        de stad bij nacht. Een perfecte eerste avond in Tokyo.
      tips: |
        Boek Shibuya Sky kaartjes minstens een paar dagen van tevoren — ze raken snel
        uitverkocht. Het uitzicht is het mooist na 19:00 wanneer de stad volledig verlicht is.
    - name: Meiji Shrine & Harajuku
      when: Dag 2 — hele dag
      description: |
        Begin bij Meiji Jingu, een serene shinto-schrijn in een bebost park vlak bij Harajuku.
        Loop daarna door Takeshita Street voor excentrieke mode en crepes,
        en stroll over het chique Omotesando-boulevard.
      tips: |
        De schrijntuin is gratis. Kom voor 09:00 om de binnentuin te zien voordat het druk wordt.
        Takeshita Street is in het weekend extreem druk — ga vroeg.
    - name: Dagtocht Mount Fuji (Kawaguchiko)
      when: Dag 3 — hele dag
      description: |
        Rijd naar Kawaguchiko aan de voet van de Fuji. Vanuit Shinjuku neem je de Fuji
        Excursion trein of een Keio-bus direct naar Kawaguchiko (circa 2 uur). Prachtige
        reflecties van de Fuji in het meer, en het Chureito Pagode-uitzichtpunt is onmisbaar.
      tips: |
        Fuji is de helft van de tijd bedekt met wolken — ochtenduitzichten zijn het best.
        Controleer de weersverwachting de avond ervoor en wees flexibel met de timing.
    - name: Shinjuku — Gyoen & Omoide Yokocho
      when: Dag 4 — avond (aankomstdag Joa & Sas)
      description: |
        Shinjuku Gyoen is een groot, prachtig onderhouden park — ideaal voor herfstbladeren
        in late november. Ga 's avonds naar Omoide Yokocho ("Herinneringssteeg"), een smal
        steegje vol kleine yakitori-stalletjes met rook die opstijgt in de nachtlucht.
      tips: |
        Omoide Yokocho is alleen contant betalen en erg klein — plaatsen zijn snel weg.
        Ga voor 19:00 of na 21:00. Gyoen entree kost 500 yen.
