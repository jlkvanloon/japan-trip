dagplanning:
  - titel: Aankomst & Dotonbori
    content: |
      Shinkansen vanuit Hiroshima (~1 uur). Inchecken hotel. Middag: Osaka Castle Park — monumentaal wit kasteel met gouden details (herbouwd 1931), museum over Toyotomi Hideyoshi, herfstkleuren in het park. Avond: Dotonbori neonwijk — takoyaki, okonomiyaki, kushikatsu. Glico Man bord, Kani Doraku met draaiende krab aan de gevel.
  - titel: Universal Studios Japan
    content: |
      Hele dag Universal Studios Japan. Universal Express Pass 7 met Mario Kart Minecart-rit en 6 andere attracties. Super Nintendo World en Wizarding World of Harry Potter zijn de hoogtepunten. Plan attracties vooraf — het park is groot. 's Avonds terug naar Dotonbori voor streetfood.
  - titel: Kuromon Markt & Vrije dag
    content: |
      Ochtend: Kuromon Ichiba markt ("keuken van Osaka") — 170 meter overdekte markt met verse sashimi, gegrilde sint-jakobsschelpen, tamagoyaki. Middag vrij voor Namba-wijk, Den Den Town (elektronica/anime) of Shinsekai-buurt. Avond: laatste avond in Osaka — Ichifuji voor kushikatsu of Mizuno voor okonomiyaki.
