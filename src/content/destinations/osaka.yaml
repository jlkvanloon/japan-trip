  - name: Mizuno
    type: Okonomiyaki (Osaka-stijl)
    notes: Iconic adres in Dotonbori, opgericht in 1945. Wachtrij maar de moeite waard.
  - name: Kuromon Ichiba
    type: Markt / Streetfood
    notes: Verse sashimi, gegrilde sint-jakobsschelpen en tamagoyaki. Ochtend het levendigst.
