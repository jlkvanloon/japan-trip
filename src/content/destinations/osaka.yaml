dagplanning:
  - titel: Aankomst & Dotonbori
    content: Shinkansen vanuit Hiroshima (~90 min) waarna we inchecken in het hotel.
      We arriveren later op de avond dus kunnen wat verkennen en dineren.
  - titel: Universal Studios Japan
    content: >
      Hele dag Universal Studios Japan. Universal Express Pass 7 met een
      fastpass voor de 7 populairste attracties ('Minecart & Selection'). Super
      Nintendo World en Wizarding World of Harry Potter zijn de hoogtepunten. 
  - titel: Kuromon Markt & Vrije dag
    content: ""
    subsections:
      - beschrijving: >+
          We vertrekken in de ochtend naar Osaka Castle waarna we rondstruinen
          door de vintage winkelstraten genaamd America-Mura en Orange Street. 


        titel: Ochtend - Osaka Castle, America-Mura en Orange Street
      - titel: Middag - Kuromon Ichibi Market en Shinsekai wijk
        beschrijving: Na wat te lunchen op de overdekte markt verkennen we de Shinsekai
          wijk, een van de meest kleurrijke en nostalgische wijken van Osaka.
      - titel: Avond - Dotonbori
        beschrijving: "In de avond is het tijd voor Dotonbori: het kloppende hart van
          het nachtleven en de eetcultuur. Bezienswaardigheden: Ebisu Bridge,
          Glico Running Man sign, Hozenji Yochoko street en de Ukiyo Koji
          steeg."
