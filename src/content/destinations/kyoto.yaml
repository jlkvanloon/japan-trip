name: Kyoto
slug: kyoto
startDate: 2026-11-24
endDate: 2026-11-29
travel:
  - titel: Reis
    from: Hakone via Odawara Station
    method: Lokale trein en Shinkansen
    duur: ~3 uur
  - titel: Dagtrip Nara
    from: Kyoto
    duur: ~45min
    method: Trein
hotel:
  name: Richmond Hotel Premier Kyoto Shijo
  url: https://www.booking.com/hotel/jp/ritutimondohoterupuremiajing-du-si-tiao.nl.html
  checkIn: 14:00 – 00:00
  checkOut: 03:00 – 11:00
  breakfast: Niet inbegrepen
  payment: €1863 betalen op 22 oktober
restaurants:
  - name: Nishiki Market
    type: Streetfood / Markt
    notes: De "keuken van Kyoto", smalle markt met 100+ stalletjes. Ideaal voor lunch.
  - name: Pontocho
    type: Kaiseki / Izakaya
    notes: Smal steegje langs de Kamo-rivier met restaurants op alle niveaus.
activities:
  brief:
    - Fushimi Inari schrijn (torii-poorten)
    - Arashiyama bamboebos & Tenryu-ji
    - Hozugawa rivier boottocht
    - Dagtocht naar Nara
    - Gion-wijk bij met geisha's
    - Theeceremonie
todos:
  - Theeceremonie boeken
dagplanning:
  - titel: Aankomst
    content: Ruimte voor spontane verkenning van Kyoto.
  - titel: Higashiyama, Kiyomizo-dera tempel, theeceremonie en Gion wijk
    content: ""
    subsections:
      - titel: Ochtend - Higashiyama
        beschrijving: Hier bezoeken we de traditionele wijk Higashiyama met de Yasaka
          Pagoda en de leuke straten Ninenzaka en Sannenzaka.
      - titel: Middag - Kiyomizo-dera tempel
        beschrijving: Een tempel met uitzicht over Kyoto.
      - titel: Theeceremonie
        beschrijving: "We gaan voor een traditionele theeceremonie waar we leren over
          het maken van thee en matcha. "
      - titel: Avond - Gion wijk van Geisha's
        beschrijving: "Een wijk waarin je aan het einde van de middag allemaal Geisha's
          ziet rondlopen. Bezienswaardigheden: Hanami-koji Dori street, Pontocho
          Alley, Yasaka Shrine, Shinbashi-dori street, Kamo river, Shirakawa
          Canal, Gion Tatsumi Bridge."
  - titel: Fushimi Inari, Nishiki Market en Pontocho Alley
    content: ""
    subsections:
      - titel: Ochtend - Fushimi Inari
        beschrijving: "De welbekende duizenden feloranje poorten. De wandelroute omhoog
          duurt 2 uur, maar we stoppen halverwege bij het Yotsutsuji viewpoint.
          Dit is een drukke bestemming dus we moeten op tijd gaan. "
      - titel: Middag - Nishiki Market
        beschrijving: Overdekte marktstraat met leuke eettentjes en kraampjes.
      - titel: Avond - Pontocho Alley
        beschrijving: Mooiste straat van Kyoto die parallel loopt aan de
          Kamo-gawa-rivier. De straat is bezaaid met traditionele winkels en
          restaurants.
  - titel: Dagtocht Nara
    content: >
      Kintetsu Line vanuit Kyoto Station naar Nara (~45 min). Nara Park met
      1000+ vrijlopende herten die buigen voor hertenkoekjes. Todai-ji met de
      grootste bronzen Boeddha van Japan. Kasuga Taisha schrijn met honderden
      stenen lantaarns. 's Avonds Pontocho-steegje langs de Kamo-rivier.
  - titel: Hozugawa River Boat Tour, Arashiyama Bamboo Forest en Tenryu-ji tempel
    content: ""
    subsections:
      - titel: Ochtend - Hozugawa River Boat Tour
        beschrijving: Schilderachtige 16 kilometer lange tocht (~2 uur) waarbij je met
          een traditionele houten boot door een prachtige bergkloof vaart.
      - titel: Middag -  Arashiyama Bamboo Forest en Tenryu-ji tempel
        beschrijving: ""
