dagplanning:
  - titel: Aankomst & Fushimi Inari
    content: |
      Shinkansen vanuit Hakone (via Odawara). Inchecken hotel. 's Middags Fushimi Inari Taisha — duizenden rode torii-poorten kronkelen omhoog langs Mt. Inari. De volledige wandeling naar de top duurt 2-3 uur; het onderste deel is het fotogeniekst. Entree gratis, paden dag en nacht open.
  - titel: Arashiyama & Tenryu-ji
    content: |
      Vroeg naar Arashiyama bamboebos — kort maar magisch in de ochtendnevel. Vlakbij Tenryu-ji, een UNESCO Werelderfgoed zen-tuin met vijver en bergachtergrond. Optioneel fiets huren voor Jojakko-ji en de heuveltemples. Avond in Gion-wijk bij schemering — Hanamikoji-dori met theehuizen en lantaarnverlichting.
  - titel: Hozugawa Rivier Boottocht
    content: |
      Boottocht om 09:00 van Kameoka door de Hozugawa-kloof naar Arashiyama (~2 uur). Ervaren schippers langs beboste rotswanden — in late november spectaculaire herfstkleuring. Middag vrij in Arashiyama of terug naar de stad.
  - titel: Dagtocht Nara
    content: |
      Kintetsu Line vanuit Kyoto Station naar Nara (~45 min). Nara Park met 1000+ vrijlopende herten die buigen voor hertenkoekjes. Todai-ji met de grootste bronzen Boeddha van Japan. Kasuga Taisha schrijn met honderden stenen lantaarns. 's Avonds Pontocho-steegje langs de Kamo-rivier.
  - titel: Filosofenpad & Nanzen-ji
    content: |
      2km kasseipad langs een kanaal van Ginkaku-ji naar Nanzen-ji — omzoomd met kers- en ahornbomen, late novemberherfstkleuren mogelijk verbluffend. Eindig bij de massieve houten sanmon-poort van Nanzen-ji. Namiddag vrij in Nishiki Market ("keuken van Kyoto").
