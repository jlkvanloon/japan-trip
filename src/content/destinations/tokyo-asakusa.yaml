dagplanning:
  - titel: Aankomst & Sumo Avond
    content: "Shinkansen vanuit Osaka (~2u30) naar Tokyo. Inchecken APA Hotel
      Asakusa. 's Avonds: Asakusa Sumo Club — echte sumo-demonstratie gevolgd
      door traditioneel chankonabe-diner (stoofpot van sumoworstelaars)."
  - titel: Asakusa, Ueno & Akihabara
    content: >
      Ochtend: Senso-ji tempel — oudste tempel van Tokyo met de indrukwekkende
      Kaminarimon (Donderpoort) en Nakamise-dori souvenirsstraat. Middag: Ueno
      Park en het Tokyo National Museum. Avond: Akihabara, het elektronica- en
      anime-district vol arcades en gadgets.
  - titel: Tsukiji, Ginza, Tokyo Tower & TeamLab
    content: >
      Vroeg begin op Tsukiji buitenmarkt voor verse sushi- en sashimi-ontbijt.
      Ginza voor luxewinkels en architectuur. Middag Tokyo Tower. Afsluiting bij
      TeamLab Planets of Borderless — meeslepende digitale kunstinstallatie.
      Laatste avond Japan.
  - titel: Terug naar Amsterdam
    content: >
      Uitchecken voor 10:00. KLM KL862 vertrekt om 13:35 vanaf Narita (NRT),
      aankomst Amsterdam 19:40. Vluchtduur 14u05. 
