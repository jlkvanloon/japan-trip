dagplanning:
  - titel: Hakone Loop & Onsen
    content: |
      Trein vanuit Shinjuku naar Hakone-Yumoto. K-bus naar Amazake Chaya (400 jaar oud theehuis, zoete amazake rijstdrank). Verder naar Moto-Hakone en Hakone Shrine — rode torii-poort in het Ashi-meer met bergzicht. Piratenschip naar Togendai, dan Hakone Ropeway naar Owakudani: actief vulkanisch gebied met zwaveldampen, probeer kuro-tamago (zwart gekookte eieren). Aankomst Mount View Hakone voor traditioneel kaiseki-diner en prive buiten-onsen.
