activities:
  brief:
    - Hakone Loop per bus, kabelbaan & piratenschip
    - Hakone Shrine met torii-poort in het meer
    - Owakudani vulkanisch dal & zwarte eieren
    - Onsen & ryokan-diner
dagplanning:
  - titel: Hakone Loop & Onsen
    content: >
      Trein vanuit Shinjuku naar Hakone-Yumoto waar we de luggage service
      gebruiken om onze koffers alvast naar het hotel te laten bregen. K-bus
      naar Amazake Chaya (400 jaar oud theehuis, zoete amazake rijstdrank).
      Verder met de K-bus naar Moto-Hakone en Hakone Shrine — rode torii-poort
      in het Ashi-meer met bergzicht. Piratenschip naar Togendai, dan Hakone
      Ropeway naar Owakudani: actief vulkanisch gebied met zwaveldampen, probeer
      kuro-tamago (zwart gekookte eieren). Aankomst Mount View Hakone voor
      traditioneel kaiseki-diner en prive buiten-onsen.
