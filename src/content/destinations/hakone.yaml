  breakfast: Ontbijt & diner inbegrepen
  payment: €232 betalen op 19 november (J&S)
  opmerkingen: Vooraf dieetwensen doorgeven en voor 18:00 aanwezig i.v.m. diner
restaurants:
  - name: Mount View Hakone (diner)
    type: Kaiseki
    notes: Inbegrepen bij het verblijf. Traditioneel meergangenmenu op de kamer.
  - name: Amazake Tea House
    type: Theehuis
    notes: 400 jaar oud theehuis. Zoete amazake rijstdrank en mochi. Alleen lunch.
activities:
  brief:
    - Hakone Loop per bus, kabelbaan & piratenschip
    - Hakone Shrine met torii-poort in het meer
    - Owakudani vulkanisch dal & zwarte eieren
    - Onsen & ryokan-diner
todos:
  - Hakone freepass kopen
  - Prive onsen reserveren (indien mogelijk)
  - Hakone luggage transport service reserveren (tussen 08.30 en 12.00 brengen
    bij Hakone-Yumoto station, na 15.00 bij hotel)
dagplanning:
  - titel: Hakone Loop & Onsen
    content: >
      We maken hier de typische hakone-loop langs vulkanisch landschap, lake
      Ashi en een traditioneel theehuis.
    subsections:
      - titel: Hakone-Yumoto
        beschrijving: "Trein vanuit Shinjuku naar Hakone-Yumoto waar we de luggage
          service gebruiken om onze koffers alvast naar het hotel te laten
          bregen. "
      - titel: Amazake Tea House
        beschrijving: "K-bus (~25 min) naar Amazake Tea House. Dit is een 400 jaar oud
          theehuis met zoete amazake rijstdrank. "
      - titel: Hakone Shrine
        beschrijving: We pakken de K-bus (~5/10 min) verder naar Moto-Hakone waar we
          10-15 minuten wandelen om bij de beroemde Hakone Shrine te komen met
          zijn rode torii-poort in het water.
      - titel: Togendai
        beschrijving: We lopen weer terug naar Moto-Hakone waar we een piratenschip
          pakken (~25 min) over Lake Ashi richting Togendai.
      - titel: Owakudani
        beschrijving: Vanaf Togendai pakken we de Hakone Ropeway (~15 min) en stappen we
          halverwege uit. Je gaat over het actieve vulkanische dal en eindigt
          bij zwavelbronnen met uitzicht over de Mount Fuji
      - titel: Gora
        beschrijving: Vanaf Owakudani pakken we de rest van de Hakone Ropeway van 10
          minuten naar Souzan waarna we (~10 min) met de Cable Car naar Gora
          gaan.
      - titel: Mount View Hakone
        beschrijving: Vanaf Gora pakken we de bus (~20/25 min) naar Mount View Hakone
          voor de Onsen en ons traditionele kaiseki-diner.
  - titel: Ochtend bij Ryokan
    content: Traditioneel ontbijt bij onze Ryokan waarna we onze reis vervolgen naar
      Kyoto.
