dagplanning:
  - titel: Hiroshima & Miyajima
    content: |
      Ochtend: Vredesgedenkteken Park — Genbaku Dome (UNESCO, achtergelaten zoals na de bom), Kindermonument met papieren kraanvogels, Vredesvlam. Vredesmuseum is essentieel, reken op 2 uur. Middag: JR-veerboot (15 min, inbegrepen JR Pass) naar Miyajima Island. Itsukushima Schrijn met drijvende torii-poort — bij hoogwater lijkt de poort op het water te drijven. Vrije herten lopen ook op het eiland. Avond Okonomi-mura voor Hiroshima-stijl okonomiyaki.
