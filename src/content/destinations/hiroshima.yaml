dagplanning:
  - titel: "Hiroshima "
    content: >
      Na aankomst in het hotel gaan we naar het Peace Memorial Park en museum
      waarna we okonomiyaki dineren in het centrum van Hiroshima.


      Middag: JR-veerboot (15 min, inbegrepen JR Pass) naar Miyajima Island. Itsukushima Schrijn met drijvende torii-poort — bij hoogwater lijkt de poort op het water te drijven. Vrije herten lopen ook op het eiland. Avond Okonomi-mura voor Hiroshima-stijl okonomiyaki.
  - titel: Miyajima
    content: We vertrekken via het Hiroshima Station (waar we onze koffers in
      lockers kunnen doen) naar Miyajima. DIt is een eiland met vrij rondlopende
      herten, mooie natuur en een drijvende torii-poort. De bezienswaardigheden
      zijn de Itsukushima-schrijn, daisho-in tempel, momiji-dani-koen park,
      mount misen, omotesando shopping street en de goju-no-to pagode. We
      vertrekken hier rond 17.00 weer om onze koffers op te halen en de
      shinkansen naar Osaka te pakken (~90 min).
