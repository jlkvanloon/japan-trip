backend:
  name: github
  repo: jlkvanloon/japan-trip
  branch: main
  base_url: https://japan-cms.tizjoaquin.workers.dev

locale: nl

media_folder: public/images
public_folder: /images

collections:
  - name: destinations
    label: Bestemmingen
    label_singular: Bestemming
    folder: src/content/destinations
    extension: yaml
    format: yaml
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { label: Naam, name: name, widget: string }
      - { label: Slug (URL), name: slug, widget: string }
      - { label: Startdatum, name: startDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false }
      - { label: Einddatum, name: endDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false }
      - label: Reis
        name: travel
        widget: object
        fields:
          - { label: Vertrek vanuit, name: from, widget: string }
          - { label: Vervoerstype, name: method, widget: string, hint: "Bijv. Vliegtuig, Shinkansen, Trein" }
          - { label: Tijden, name: tijden, widget: string, required: false, hint: "Bijv. 14:20 AMS → 11:45+1 NRT" }
          - { label: Vluchtnummer, name: vluchtnummer, widget: string, required: false }
          - { label: Treinnummer, name: treinnummer, widget: string, required: false }
          - { label: Duur, name: duur, widget: string, required: false, hint: "Bijv. 13u25" }
          - { label: Klasse, name: klasse, widget: string, required: false }
          - { label: Bagage, name: bagage, widget: string, required: false }

      - label: Verblijf
        name: hotel
        widget: object
        fields:
          - { label: Naam hotel, name: name, widget: string }
          - { label: Website URL, name: url, widget: string, required: false }
          - { label: Incheck, name: checkIn, widget: string, required: false }
          - { label: Uitcheck, name: checkOut, widget: string, required: false }
          - { label: Ontbijt, name: breakfast, widget: string, required: false }
          - { label: Betaling, name: payment, widget: string, required: false }
          - { label: Opmerkingen, name: opmerkingen, widget: text, required: false }

      - label: Restaurants
        name: restaurants
        widget: list
        required: false
        fields:
          - { label: Naam, name: name, widget: string }
          - { label: Type, name: type, widget: string }
          - { label: Wanneer, name: when, widget: string, required: false }
          - { label: Notities, name: notes, widget: text, required: false }

      - label: Activiteiten (popup overzicht)
        name: activities
        widget: object
        fields:
          - label: Kort overzicht
            name: brief
            widget: list
            field: { label: Activiteit, name: item, widget: string }

      - label: Dag planning
        name: dagplanning
        widget: list
        required: false
        fields:
          - { label: Titel, name: titel, widget: string, hint: "Bijv. Aankomst & Shibuya" }
          - { label: Beschrijving (simpel), name: content, widget: text, required: false, hint: "Gebruik óf dit veld óf subsecties hieronder" }
          - label: Subsecties
            name: subsections
            widget: list
            required: false
            fields:
              - { label: Titel, name: titel, widget: string, hint: "Bijv. Ochtend — Senso-ji Tempel" }
              - { label: Beschrijving, name: beschrijving, widget: text }
